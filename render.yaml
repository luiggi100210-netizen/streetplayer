databases:
  - name: streetplayer-db
    databaseName: streetplayer
    user: streetplayer
    plan: free

services:
  - type: web
    name: streetplayer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: streetplayer-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: TZ
        value: America/Lima
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
